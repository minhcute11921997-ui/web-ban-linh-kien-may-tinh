<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Lab Chat Test</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --surface: #ffffff;
        --surface-2: #eef3f7;
        --line: #d7dee7;
        --text: #17202a;
        --muted: #667085;
        --brand: #0f766e;
        --brand-dark: #115e59;
        --accent: #b45309;
        --danger: #b42318;
        --shadow: 0 14px 42px rgba(20, 27, 37, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .app {
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr) 360px;
        min-height: 100vh;
      }

      .sidebar,
      .inspector {
        background: var(--surface);
        border-color: var(--line);
        padding: 20px;
      }

      .sidebar {
        border-right: 1px solid var(--line);
      }

      .inspector {
        border-left: 1px solid var(--line);
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 22px;
      }

      .brand h1 {
        margin: 0;
        font-size: 19px;
        line-height: 1.2;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 28px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .status::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--danger);
      }

      .status.ok::before {
        background: var(--brand);
      }

      .field {
        display: grid;
        gap: 8px;
        margin: 18px 0;
      }

      .field label,
      .group-title {
        color: #344054;
        font-size: 13px;
        font-weight: 700;
      }

      .input,
      .select {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        padding: 9px 11px;
        outline: none;
      }

      .input:focus,
      .select:focus,
      textarea:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
      }

      .toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 11px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-2);
      }

      .toggle input {
        width: 18px;
        height: 18px;
        accent-color: var(--brand);
      }

      .sample-list {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .sample {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: #243243;
        padding: 8px 10px;
        text-align: left;
      }

      .sample:hover {
        border-color: var(--brand);
        color: var(--brand-dark);
      }

      .main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        min-width: 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        min-height: 72px;
        padding: 16px 22px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.88);
      }

      .topbar h2 {
        margin: 0;
        font-size: 18px;
      }

      .meta-line {
        margin-top: 3px;
        color: var(--muted);
        font-size: 13px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .btn {
        min-height: 38px;
        border-radius: 8px;
        padding: 8px 12px;
        background: var(--brand);
        color: #fff;
        font-weight: 700;
      }

      .btn.secondary {
        border: 1px solid var(--line);
        background: #fff;
        color: #243243;
      }

      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .messages {
        overflow: auto;
        padding: 22px;
      }

      .empty {
        display: grid;
        place-items: center;
        min-height: 100%;
        color: var(--muted);
        text-align: center;
      }

      .empty strong {
        display: block;
        margin-bottom: 8px;
        color: var(--text);
        font-size: 18px;
      }

      .message {
        display: grid;
        gap: 8px;
        max-width: 860px;
        margin-bottom: 16px;
      }

      .message.user {
        margin-left: auto;
      }

      .bubble {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 13px 14px;
        box-shadow: var(--shadow);
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .user .bubble {
        border-color: #0f766e;
        background: #e7f6f3;
      }

      .message-meta {
        color: var(--muted);
        font-size: 12px;
      }

      .composer {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        padding: 16px 22px;
        border-top: 1px solid var(--line);
        background: var(--surface);
      }

      textarea {
        width: 100%;
        min-height: 50px;
        max-height: 160px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        outline: none;
      }

      .send {
        min-width: 92px;
      }

      .panel {
        margin-bottom: 18px;
      }

      .panel h3 {
        margin: 0 0 10px;
        font-size: 15px;
      }

      .kv {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .kv div {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        border-bottom: 1px solid #edf0f3;
        padding-bottom: 7px;
      }

      .kv strong {
        color: var(--text);
        font-weight: 700;
        text-align: right;
      }

      .products {
        display: grid;
        gap: 10px;
      }

      .product {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 12px;
      }

      .product-name {
        margin: 0 0 8px;
        font-size: 13px;
        line-height: 1.35;
      }

      .product-info {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .tag {
        border: 1px solid #d4d9e2;
        border-radius: 999px;
        padding: 3px 8px;
        background: #f7f8fa;
      }

      .price {
        color: var(--accent);
        font-weight: 800;
      }

      .debug {
        max-height: 260px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #101828;
        color: #d1fadf;
        padding: 12px;
        font-family: "Cascadia Code", Consolas, monospace;
        font-size: 12px;
        white-space: pre-wrap;
      }

      @media (max-width: 1100px) {
        .app {
          grid-template-columns: 260px minmax(0, 1fr);
        }

        .inspector {
          display: none;
        }
      }

      @media (max-width: 760px) {
        .app {
          display: block;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .topbar,
        .composer {
          padding: 14px;
        }

        .messages {
          min-height: 52vh;
          padding: 14px;
        }

        .composer {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <h1>Chatbot Lab</h1>
          <span id="status" class="status">Offline</span>
        </div>

        <div class="field">
          <label for="apiUrl">API</label>
          <input id="apiUrl" class="input" value="http://127.0.0.1:4001" />
        </div>

        <div class="field">
          <label for="limit">Số sản phẩm</label>
          <input id="limit" class="input" type="number" min="1" max="20" value="8" />
        </div>
        <div class="field">
          <div class="group-title">Câu test nhanh</div>
          <div id="samples" class="sample-list"></div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h2>Test chatbot bán hàng</h2>
            <div id="subtitle" class="meta-line">Kết nối service lab trước khi gửi câu hỏi.</div>
          </div>
          <div class="actions">
            <button id="healthBtn" class="btn secondary" type="button">Kiểm tra</button>
            <button id="reloadBtn" class="btn secondary" type="button">Reload</button>
            <button id="clearBtn" class="btn secondary" type="button">Xóa chat</button>
          </div>
        </header>

        <section id="messages" class="messages">
          <div class="empty">
            <div>
              <strong>Sẵn sàng test</strong>
              Chọn câu mẫu hoặc nhập câu hỏi bán hàng, tư vấn linh kiện.
            </div>
          </div>
        </section>

        <form id="composer" class="composer">
          <textarea id="message" placeholder="Ví dụ: Mua CPU thì cần mua kèm main nào?"></textarea>
          <button id="sendBtn" class="btn send" type="submit">Gửi</button>
        </form>
      </main>

      <aside class="inspector">
        <section class="panel">
          <h3>Phản hồi mới nhất</h3>
          <div class="kv">
            <div><span>Nguồn</span><strong id="source">-</strong></div>
            <div><span>Độ trễ</span><strong id="latency">-</strong></div>
            <div><span>Sản phẩm</span><strong id="productCount">-</strong></div>
            <div><span>Ngân sách</span><strong id="budget">-</strong></div>
          </div>
        </section>

        <section class="panel">
          <h3>Sản phẩm trả về</h3>
          <div id="products" class="products"></div>
        </section>

        <section class="panel">
          <h3>Debug</h3>
          <pre id="debug" class="debug">Chưa có dữ liệu.</pre>
        </section>
      </aside>
    </div>

    <script>
      const samples = [
        "Mua CPU thi can mua kem main nao?",
        "Mainboard H610 dat qua, co mau nao re hon?",
        "Nang cap RAM len 32GB nen chon mau nao?",
        "Toi phan van giua RAM DDR4 va DDR5",
        "Kiem tra combo CPU i5-14400, Mainboard B760M DDR5, RAM DDR5 16GB, SSD P210 tong gia bao nhieu?",
        "CPU Ryzen 7 9800X3D di voi main H610 DDR5 co hop khong?",
        "RAM DDR4 Kingston dung voi main B760M DDR5 duoc khong?",
        "Tu van PC AutoCAD khoang 20 trieu",
        "Can cau hinh livestream game tam 25tr",
        "card mh rtx 4060ti con k",
        "Khach chi co 3tr muon CPU on nhat",
      ];

      const els = {
        apiUrl: document.querySelector("#apiUrl"),
        limit: document.querySelector("#limit"),
        samples: document.querySelector("#samples"),
        status: document.querySelector("#status"),
        subtitle: document.querySelector("#subtitle"),
        messages: document.querySelector("#messages"),
        composer: document.querySelector("#composer"),
        message: document.querySelector("#message"),
        sendBtn: document.querySelector("#sendBtn"),
        healthBtn: document.querySelector("#healthBtn"),
        reloadBtn: document.querySelector("#reloadBtn"),
        clearBtn: document.querySelector("#clearBtn"),
        source: document.querySelector("#source"),
        latency: document.querySelector("#latency"),
        productCount: document.querySelector("#productCount"),
        budget: document.querySelector("#budget"),
        products: document.querySelector("#products"),
        debug: document.querySelector("#debug"),
      };

      const money = (value) =>
        Number(value || 0).toLocaleString("vi-VN", { maximumFractionDigits: 0 }) + "đ";

      const api = (path) => `${els.apiUrl.value.replace(/\/+$/, "")}${path}`;

      const setStatus = (ok, text) => {
        els.status.classList.toggle("ok", Boolean(ok));
        els.status.textContent = text;
      };

      const clearEmpty = () => {
        const empty = els.messages.querySelector(".empty");
        if (empty) empty.remove();
      };

      const addMessage = ({ role, text, meta }) => {
        clearEmpty();
        const item = document.createElement("article");
        item.className = `message ${role}`;
        item.innerHTML = `
          <div class="bubble"></div>
          <div class="message-meta"></div>
        `;
        item.querySelector(".bubble").textContent = text;
        item.querySelector(".message-meta").textContent = meta || "";
        els.messages.appendChild(item);
        els.messages.scrollTop = els.messages.scrollHeight;
      };

      const renderProducts = (products) => {
        els.products.innerHTML = "";
        if (!products || products.length === 0) {
          els.products.innerHTML = '<div class="meta-line">Không có sản phẩm.</div>';
          return;
        }

        for (const product of products) {
          const node = document.createElement("article");
          node.className = "product";
          node.innerHTML = `
            <h4 class="product-name"></h4>
            <div class="product-info">
              <span class="tag"></span>
              <span class="tag price"></span>
              <span class="tag stock"></span>
            </div>
          `;
          node.querySelector(".product-name").textContent = product.name || "Sản phẩm";
          node.querySelector(".tag").textContent = product.category_name || "Danh mục";
          node.querySelector(".price").textContent = money(product.sale_price || product.price);
          const stock = node.querySelector(".stock");
          if (Number(product.stock || 0) <= 0) {
            stock.textContent = "Hết hàng";
          } else {
            stock.remove();
          }
          els.products.appendChild(node);
        }
      };

      const renderInspector = (data) => {
        els.source.textContent = data.source || "-";
        els.latency.textContent = data.latencyMs ? `${data.latencyMs}ms` : "-";
        els.productCount.textContent = String((data.products || []).length);
        els.budget.textContent = data.debug?.budget ? money(data.debug.budget) : "-";
        renderProducts(data.products || []);
        els.debug.textContent = JSON.stringify(data.debug || {}, null, 2);
      };

      const requestJson = async (path, options = {}) => {
        const res = await fetch(api(path), {
          headers: { "Content-Type": "application/json" },
          ...options,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
        return data;
      };

      const checkHealth = async () => {
        try {
          const data = await requestJson("/health");
          setStatus(data.ok, data.ok ? "Online" : "Lỗi");
          els.subtitle.textContent = `${data.knowledgeBase?.products || 0} sản phẩm, ${data.knowledgeBase?.categories || 0} danh mục, vector ${data.vectorIndex?.model || "-"}`;
        } catch (error) {
          setStatus(false, "Offline");
          els.subtitle.textContent = error.message;
        }
      };

      const reloadService = async () => {
        els.reloadBtn.disabled = true;
        try {
          await requestJson("/reload", { method: "POST", body: "{}" });
          await checkHealth();
        } catch (error) {
          setStatus(false, "Lỗi reload");
          els.subtitle.textContent = error.message;
        } finally {
          els.reloadBtn.disabled = false;
        }
      };

      const sendMessage = async (message) => {
        const text = message.trim();
        if (!text) return;

        addMessage({ role: "user", text, meta: "Bạn" });
        els.message.value = "";
        els.sendBtn.disabled = true;

        try {
          const data = await requestJson("/chat", {
            method: "POST",
            body: JSON.stringify({
              message: text,
              limit: Number(els.limit.value || 8),
            }),
          });
          addMessage({
            role: "assistant",
            text: data.reply || "Không có phản hồi.",
            meta: `${data.source || "unknown"} · ${data.latencyMs || 0}ms · ${(data.products || []).length} sản phẩm`,
          });
          renderInspector(data);
        } catch (error) {
          addMessage({ role: "assistant", text: `Lỗi: ${error.message}`, meta: "Service" });
        } finally {
          els.sendBtn.disabled = false;
          els.message.focus();
        }
      };

      for (const sample of samples) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "sample";
        button.textContent = sample;
        button.addEventListener("click", () => sendMessage(sample));
        els.samples.appendChild(button);
      }

      els.composer.addEventListener("submit", (event) => {
        event.preventDefault();
        sendMessage(els.message.value);
      });

      els.message.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage(els.message.value);
        }
      });

      els.healthBtn.addEventListener("click", checkHealth);
      els.reloadBtn.addEventListener("click", reloadService);
      els.clearBtn.addEventListener("click", () => {
        els.messages.innerHTML = '<div class="empty"><div><strong>Sẵn sàng test</strong>Chọn câu mẫu hoặc nhập câu hỏi bán hàng, tư vấn linh kiện.</div></div>';
        renderInspector({ products: [], debug: {} });
      });

      checkHealth();
    </script>
  </body>
</html>
